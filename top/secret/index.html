<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Datapad Access</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <section id="gateScreen" class="screen active">
    <div class="gate-wrap">
      <div class="datapad">
        <p class="gate-title">Datapad Access Console</p>
        <h1 class="gate-headline">Restricted Entry</h1>
        <div id="readout" class="input-readout">_ _ _ _</div>
        <div class="keypad" id="keypad">
          <button type="button" class="key" data-key="1">1</button>
          <button type="button" class="key" data-key="2">2</button>
          <button type="button" class="key" data-key="3">3</button>
          <button type="button" class="key" data-key="4">4</button>
          <button type="button" class="key" data-key="5">5</button>
          <button type="button" class="key" data-key="6">6</button>
          <button type="button" class="key" data-key="7">7</button>
          <button type="button" class="key" data-key="8">8</button>
          <button type="button" class="key" data-key="9">9</button>
          <button type="button" class="key alt" data-key="c">C</button>
          <button type="button" class="key" data-key="0">0</button>
          <button type="button" class="key alt" data-key="Backspace">&lt;</button>
        </div>
        <p class="gate-hint" id="gateHint">Enter passcode with keypad or keyboard</p>
      </div>
    </div>
  </section>

  <section id="terminalScreen" class="screen">
    <div class="terminal-box"><span id="typed"></span><span class="cursor">|</span></div>
    <button id="confirmBtn" class="terminal-btn">Confirm Allegience to the Flag</button>
  </section>

  <section id="commandScreen" class="screen">
    <div class="cc-layout">
      <div class="hud">
        <div class="pill">Treasury: <span id="treasuryText">$0</span></div>
        <div class="pill">Stability: <span id="stabilityText">0%</span></div>
        <div class="pill">Selected: <span id="selectionText">None</span></div>
        <div class="pill">Current Tool: <span id="weaponText">Missiles</span></div>
      </div>

      <div class="workzone">
        <div class="map-pane">
          <canvas id="mapCanvas"></canvas>
          <div class="shadow-man">
            <div class="face"></div>
            <div id="instructionText" class="instruction">Awaiting your first taxpayer-funded decision.</div>
          </div>
        </div>

        <aside class="side">
          <div class="panel">
            <h3>Threat Stack</h3>
            <div id="threatList" class="threat-list"></div>
          </div>

          <div class="panel">
            <h3>Defensive Options</h3>
            <div class="defenses">
              <button id="droneBtn" class="btn">Drone Retaliation</button>
              <button id="missileDefenseBtn" class="btn">Missile Defense</button>
            </div>
          </div>

          <div class="panel panel--events">
            <h3>Event Feed</h3>
            <div id="eventFeed" class="event-feed"></div>
          </div>
        </aside>
      </div>

      <div id="weaponBar" class="weapon-bar"></div>
    </div>
  </section>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/relief-map.js"></script>
  <script src="./js/command-center.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
